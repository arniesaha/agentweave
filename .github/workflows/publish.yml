name: Publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write   # OIDC trusted publishing
  packages: write   # ghcr.io Docker push

jobs:
  # ── Python ──────────────────────────────────────────────
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: sdk/python
        run: |
          cp ../../README.md .
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: sdk/python
        run: pytest

  publish-pypi:
    needs: [test-python, preflights]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build and stage OpenClaw bridge bundle
        run: bash scripts/build-openclaw-bridge-dist.sh

      - name: Build package
        working-directory: sdk/python
        run: |
          pip install build
          cp ../../README.md .
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
          skip-existing: true

  # ── TypeScript / JavaScript ─────────────────────────────
  test-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: sdk/js
        run: npm ci

      - name: Run tests
        working-directory: sdk/js
        run: npx jest --verbose

  publish-npm:
    needs: [test-js, preflights]
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: sdk/js
        run: npm ci

      - name: Preflight npm publish access
        run: bash scripts/npm-publish-preflight.sh --require-auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build
        working-directory: sdk/js
        run: npm run build

      - name: Publish to npm
        working-directory: sdk/js
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Go ──────────────────────────────────────────────────
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run tests
        working-directory: sdk/go
        run: go test ./... -v

      - name: Verify module
        working-directory: sdk/go
        run: go vet ./...

  preflights:
    name: Repository preflights
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Validate compatibility smoke script
        run: |
          bash -n scripts/compatibility-smoke.sh
          bash scripts/compatibility-smoke.sh

      - name: Validate trace quality gate
        run: |
          python -m pip install pytest
          python -m py_compile scripts/trace_quality_gate.py tests/test_trace_quality_gate.py
          python -m pytest tests/test_trace_quality_gate.py

      - name: Validate npm publish preflight script
        run: |
          bash -n scripts/npm-publish-preflight.sh
          bash scripts/npm-publish-preflight.sh

      - name: Validate OpenClaw bridge bundle is self-contained
        run: |
          bash scripts/build-openclaw-bridge-dist.sh
          test -f sdk/python/agentweave/openclaw_bridge_dist/index.js
          test -f sdk/python/agentweave/openclaw_bridge_dist/openclaw.plugin.json
          test -f sdk/python/agentweave/openclaw_bridge_dist/package.json

  # ── Docker ──────────────────────────────────────────────
  docker:
    needs: [test-python, preflights]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/arniesaha/agentweave:${{ steps.tag.outputs.version }}
            ghcr.io/arniesaha/agentweave:latest
