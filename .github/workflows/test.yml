name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: sdk/python
        run: |
          cp ../../README.md .
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: sdk/python
        run: pytest

  go:
    name: Go
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run tests
        working-directory: sdk/go
        run: go test ./... -v

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: sdk/js
        run: npm ci

      - name: Run tests
        working-directory: sdk/js
        run: npx jest --verbose

  plugin-openclaw-bridge:
    name: Plugin — openclaw-agentweave-bridge
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: plugins/openclaw-agentweave-bridge
        run: npm install

      - name: Run tests
        working-directory: plugins/openclaw-agentweave-bridge
        run: npm test
