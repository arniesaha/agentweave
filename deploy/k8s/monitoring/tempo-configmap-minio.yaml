server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  lifecycler:
    ring:
      replication_factor: 1
      kvstore:
        store: inmemory
  trace_idle_period: 10s
  max_block_duration: 5m

query_frontend:
  max_retries: 2
  search:
    max_duration: 0
  metrics:
    max_duration: 3h

compactor:
  compaction:
    block_retention: 720h
    compacted_block_retention: 24h
    compaction_window: 4h

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write
        send_exemplars: true
  processor:
    span_metrics:
      dimensions:
        - prov.agent.id
        - prov.project
        - prov.llm.provider
        - prov.llm.model
      histogram_buckets: [0.1, 0.25, 0.5, 1, 2.5, 5, 10, 30, 60, 120]
    service_graphs:
      dimensions:
        - prov.agent.id
    local_blocks:
      max_live_traces: 50000
      max_block_duration: 2h
      max_block_bytes: 1073741824
      flush_check_period: 30s
      trace_idle_period: 30s
      complete_block_timeout: 2h
  traces_storage:
    path: /var/tempo/generator/traces

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics, local-blocks]

storage:
  trace:
    backend: s3
    s3:
      endpoint: minio.monitoring.svc.cluster.local:9000
      bucket: tempo
      access_key: minioadmin
      secret_key: minioadmin123
      insecure: true
    wal:
      path: /var/tempo/wal
    pool:
      max_workers: 100
      queue_depth: 10000
