---
apiVersion: v1
kind: ConfigMap
metadata:
  name: agentweave-proxy-max
  namespace: agentweave
data:
  AGENTWEAVE_AGENT_ID: "max-v1"
  AGENTWEAVE_OTLP_ENDPOINT: "http://tempo.monitoring.svc.cluster.local:4318"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentweave-proxy-max
  namespace: agentweave
  labels:
    app: agentweave-proxy-max
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentweave-proxy-max
  template:
    metadata:
      labels:
        app: agentweave-proxy-max
    spec:
      containers:
        - name: proxy
          image: localhost:5000/agentweave-proxy:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: agentweave-proxy-max
          env:
            - name: AGENTWEAVE_PROXY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agentweave-proxy
                  key: proxy-token
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: agentweave-proxy-max-nodeport
  namespace: agentweave
spec:
  type: NodePort
  selector:
    app: agentweave-proxy-max
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30401
