# ⚠️  DO NOT apply this file with kubectl apply — it contains a placeholder token.
#     The real secret is managed out-of-band. deploy.sh intentionally skips this file.
#
# To set or rotate the proxy token manually:
#   kubectl create secret generic agentweave-proxy \
#     --from-literal=proxy-token="$(openssl rand -hex 32)" \
#     -n agentweave --dry-run=client -o yaml | kubectl apply -f -
#
# To disable auth (LAN-open mode, current production setting):
#   kubectl create secret generic agentweave-proxy \
#     --from-literal=proxy-token="" \
#     -n agentweave --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: agentweave-proxy
  namespace: agentweave
type: Opaque
stringData:
  # PLACEHOLDER — never apply this directly. See comment above.
  proxy-token: "CHANGE_ME"
