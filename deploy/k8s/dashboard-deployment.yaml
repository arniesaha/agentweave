apiVersion: v1
kind: Namespace
metadata:
  name: agentweave
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentweave-dashboard
  namespace: agentweave
  labels:
    app: agentweave-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentweave-dashboard
  template:
    metadata:
      labels:
        app: agentweave-dashboard
    spec:
      containers:
        - name: dashboard
          image: localhost:5000/agentweave-dashboard:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: agentweave-dashboard
                optional: true
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: agentweave-dashboard
  namespace: agentweave
  labels:
    app: agentweave-dashboard
spec:
  type: NodePort
  selector:
    app: agentweave-dashboard
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30896
