apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentweave-proxy-nix-subagent
  namespace: agentweave
  labels:
    app: agentweave-proxy-nix-subagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentweave-proxy-nix-subagent
  template:
    metadata:
      labels:
        app: agentweave-proxy-nix-subagent
    spec:
      containers:
        - name: proxy
          image: localhost:5000/agentweave-proxy:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: agentweave-proxy-nix-subagent
          # No AGENTWEAVE_PROXY_TOKEN — sub-agent proxy is LAN-only (NodePort 30402).
          # Claude Code sub-agents use ANTHROPIC_BASE_URL directly without custom auth headers.
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
