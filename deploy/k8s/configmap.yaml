apiVersion: v1
kind: ConfigMap
metadata:
  name: agentweave-proxy
  namespace: agentweave
data:
  # OTLP HTTP endpoint for trace export.
  # Dogfood deployments should send to the collector fanout, which keeps Tempo
  # canonical and can optionally mirror selected spans to Langfuse.
  AGENTWEAVE_OTLP_ENDPOINT: "http://agentweave-otel-collector.monitoring.svc.cluster.local:4318"

  # AGENTWEAVE_AGENT_ID intentionally unset. proxy.py already falls back to
  # "unattributed" (or "unattributed:<project>" when project is known, #199)
  # when no per-request header/env is present. Setting a literal default here
  # would short-circuit the qualified fallback.

  # Capture prompt/response previews in spans for session replay
  AGENTWEAVE_CAPTURE_PROMPTS: "1"

  # Proxy-side API key injection — enables callers to set ANTHROPIC_API_KEY=dummy.
  # These are secrets; inject via secretKeyRef in the Deployment, not here.
  # Example Deployment env entry:
  #   - name: AGENTWEAVE_ANTHROPIC_API_KEY
  #     valueFrom:
  #       secretKeyRef:
  #         name: agentweave-secrets
  #         key: AGENTWEAVE_ANTHROPIC_API_KEY
  #         optional: true
  # (same pattern for AGENTWEAVE_GOOGLE_API_KEY and AGENTWEAVE_OPENAI_API_KEY)
