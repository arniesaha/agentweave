apiVersion: v1
kind: ConfigMap
metadata:
  name: agentweave-proxy
  namespace: agentweave
data:
  # OTLP HTTP endpoint for trace export
  AGENTWEAVE_OTLP_ENDPOINT: "http://tempo.monitoring.svc.cluster.local:4318"

  # Fallback agent ID when request has no X-AgentWeave-Agent-Id header.
  # Per-request headers take precedence (see proxy.py attribute resolution).
  AGENTWEAVE_AGENT_ID: "unattributed"

  # Capture prompt/response previews in spans for session replay
  AGENTWEAVE_CAPTURE_PROMPTS: "1"

  # Proxy-side API key injection — enables callers to set ANTHROPIC_API_KEY=dummy.
  # These are secrets; inject via secretKeyRef in the Deployment, not here.
  # Example Deployment env entry:
  #   - name: AGENTWEAVE_ANTHROPIC_API_KEY
  #     valueFrom:
  #       secretKeyRef:
  #         name: agentweave-secrets
  #         key: AGENTWEAVE_ANTHROPIC_API_KEY
  #         optional: true
  # (same pattern for AGENTWEAVE_GOOGLE_API_KEY and AGENTWEAVE_OPENAI_API_KEY)
